<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;font-size:13px;background:#fff;color:#111;}
:root{--red:#e8291c;--blue:#2563eb;--purple:#7c3aed;--bg:#fff;--bg2:#f8f8f6;--bg3:#f1f1ee;--border:#e3e3df;--border2:#d0d0cc;--text:#111;--text2:#555;--text3:#aaa;--sw:260px;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-mark{width:36px;height:36px;border-radius:9px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0;}
.sb-name{font-weight:900;font-size:15px;}.sb-sub{font-size:10px;color:var(--text3);}
.sb-sec{padding:12px 14px 4px;}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.sb-lbl-link{color:var(--red);cursor:pointer;font-size:10px;}
.brand-btns{display:flex;flex-direction:column;gap:3px;}
.brand-btn{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-family:inherit;color:var(--text2);transition:all .14s;text-align:left;}
.brand-btn:hover{background:var(--bg3);}.brand-btn.on{border-color:currentColor;font-weight:700;}
.brand-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{padding:3px 8px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--bg);transition:all .13s;white-space:nowrap;user-select:none;}
.chip:hover{border-color:var(--red);color:var(--red);}.chip.on{background:var(--red);border-color:var(--red);color:#fff;}
.sb-search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.sb-search:focus{border-color:var(--red);}
.sb-search::placeholder{color:var(--text3);}
.rout-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:7px;margin-bottom:2px;cursor:pointer;transition:background .13s;}
.rout-row:hover{background:var(--bg3);}
.rout-day{font-size:11px;font-weight:700;color:var(--red);width:22px;}
.rout-tag{flex:1;font-size:10px;padding:2px 8px;border-radius:5px;text-align:center;background:var(--bg3);color:var(--text2);}
.rout-tag.set{background:rgba(232,41,28,.10);color:var(--red);font-weight:600;}
.sb-bottom{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:6px;}
.sb-btn{flex:1;padding:7px 6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;text-align:center;}
.sb-btn:hover{background:var(--bg3);}
.topbar{height:52px;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.nav-btn{width:30px;height:30px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.m-sel{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-family:inherit;font-weight:700;font-size:14px;color:var(--text);cursor:pointer;outline:none;}
.today-btn{padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;}
.today-btn:hover{border-color:var(--red);color:var(--red);}
.view-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:2px;}
.vbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--text2);font-family:inherit;}
.vbtn.on{background:var(--red);color:#fff;}
.tb-right{margin-left:auto;display:flex;gap:6px;align-items:center;}
.add-btn-top{padding:7px 14px;background:var(--red);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.live-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:#16a34a;font-weight:600;}
.live-pulse{width:8px;height:8px;border-radius:50%;background:#16a34a;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
.statsbar{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:14px;overflow-x:auto;flex-shrink:0;}
.stat-item{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stat-dot{width:8px;height:8px;border-radius:50%;}
.stat-lbl{font-size:11px;color:var(--text2);}
.stat-val{font-size:12px;font-weight:700;}
.clr-btn{margin-left:auto;padding:3px 10px;background:rgba(232,41,28,.08);border:1px solid rgba(232,41,28,.25);border-radius:20px;font-size:10px;font-weight:600;color:var(--red);cursor:pointer;white-space:nowrap;}
.cal-wrap{flex:1;overflow-y:auto;padding:14px;background:var(--bg);}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.dh{background:var(--bg2);text-align:center;padding:8px 2px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);}
.dh.sun{color:var(--red);}.dh.sat{color:var(--blue);}
.day-cell{background:var(--bg);padding:6px;min-height:110px;cursor:pointer;position:relative;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.day-cell:hover{background:#fafaf8;}
.day-cell.other{background:var(--bg2);opacity:.55;}
.day-cell.today{background:#fff8f8;}
.day-cell.today::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
.day-cell.drag-over{outline:2px dashed var(--red);outline-offset:-3px;}
.day-num{font-size:12px;font-weight:700;margin-bottom:4px;display:inline-flex;line-height:1;}
.day-num.sun-c{color:var(--red);}.day-num.sat-c{color:var(--blue);}
.day-num.td-c{background:var(--red);color:#fff;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;}
.rout-badge{position:absolute;top:4px;right:4px;background:rgba(232,41,28,.1);color:var(--red);font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;}
.c-card{margin-bottom:3px;padding:4px 6px;border-radius:5px;font-size:15px;cursor:grab;line-height:1.35;border-left:2.5px solid;display:block;}
.c-card:hover{opacity:.85;}
.c-card-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-card-meta{font-size:12px;margin-top:1px;opacity:.7;}
.brand-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px;vertical-align:middle;}
.cell-add{width:100%;padding:2px;background:transparent;border:1px dashed var(--border2);border-radius:5px;color:var(--text3);font-size:10px;cursor:pointer;font-family:inherit;margin-top:3px;}
.cell-add:hover{border-color:var(--red);color:var(--red);}
.week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.wk-dh{background:var(--bg2);padding:8px 4px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.wk-dh-n{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;}
.wk-dh-d{font-size:22px;font-weight:900;margin-top:2px;}
.wk-dh-d.td{display:inline-flex;width:32px;height:32px;background:var(--red);color:#fff;border-radius:50%;align-items:center;justify-content:center;font-size:18px;}
.wk-cell{background:var(--bg);min-height:300px;padding:6px;cursor:pointer;border-right:1px solid var(--border);}
.wk-cell:hover{background:#fafaf8;}.wk-cell.td{background:#fff8f8;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;width:100%;max-width:800px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;display:flex;align-items:center;gap:10px;}
.modal-date{background:rgba(232,41,28,.08);color:var(--red);font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap;}
.modal-title-inp{flex:1;background:transparent;border:none;font-size:16px;font-weight:700;color:var(--text);font-family:inherit;outline:none;}
.modal-title-inp::placeholder{color:var(--text3);}
.modal-close{width:28px;height:28px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--red);color:#fff;}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.fg{display:flex;flex-direction:column;gap:4px;}.fg.full{grid-column:1/-1;}
.flabel{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);}
.finput,.fsel,.fta{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%;}
.finput:focus,.fsel:focus,.fta:focus{border-color:var(--red);}
.fta{resize:vertical;min-height:64px;}
.st-row{display:flex;gap:5px;flex-wrap:wrap;}
.st-pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;opacity:.4;user-select:none;transition:opacity .13s;}
.st-pill.on{opacity:1;}
.viral-row{display:flex;gap:5px;flex-wrap:wrap;}
.vtag{padding:4px 9px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg2);user-select:none;}
.vtag.on{background:rgba(232,41,28,.08);border-color:rgba(232,41,28,.35);color:var(--red);font-weight:600;}
.met-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.met-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 6px;text-align:center;}
.met-icon{font-size:16px;margin-bottom:2px;}
.met-inp{width:100%;background:transparent;border:none;text-align:center;font-size:18px;font-weight:700;color:var(--text);font-family:inherit;outline:none;}
.met-lbl{font-size:9px;color:var(--text3);letter-spacing:.5px;}
.img-zone{background:var(--bg2);border:2px dashed var(--border2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;}
.img-zone:hover{border-color:var(--red);}
.img-prev{width:100%;max-height:130px;object-fit:cover;border-radius:7px;margin-bottom:7px;}
.hash-prev{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.hash-tag{background:rgba(37,99,235,.08);color:var(--blue);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.sdiv{margin:12px 0 7px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:8px;}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border);}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
.btn-p{background:var(--red);color:#fff;}.btn-p:hover{background:#c41f14;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-d{background:transparent;border:1px solid rgba(220,38,38,.3);color:#dc2626;}
.toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;border-radius:10px;padding:10px 15px;font-size:13px;font-weight:500;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.rout-modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.mob-menu{display:none;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:15;}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:20;}
  .sidebar.open{transform:translateX(0);}
  .sb-overlay.open{display:block;}
  .mob-menu{display:flex;}
  .fg2{grid-template-columns:1fr;}
  .met-row{grid-template-columns:repeat(2,1fr);}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
</style>
</head>
<body>
<div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;gap:10px;color:#555;">
  <div style="width:18px;height:18px;border:2px solid #eee;border-top-color:#e8291c;border-radius:50%;animation:spin .6s linear infinite;"></div>
  연결 중...
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>
<div id="app" class="app" style="display:none;"></div>
<script>
// ── Firebase 초기화 ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCupA_Esn47o0XJAbXSVnCN05SbQKTCi_k",
  authDomain: "samdae-mxssive.firebaseapp.com",
  databaseURL: "https://samdae-mxssive-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "samdae-mxssive",
  storageBucket: "samdae-mxssive.firebasestorage.app",
  messagingSenderId: "670718144556",
  appId: "1:670718144556:web:cfca689852e4ef15a0a189"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── 상수 ────────────────────────────────────────────────
const BRANDS=[{id:'samdae',name:'삼대오백',color:'#e8291c',bg:'rgba(232,41,28,.12)'},{id:'mxiv',name:'엠엑시브',color:'#2563eb',bg:'rgba(37,99,235,.12)'}];
const BM=Object.fromEntries(BRANDS.map(b=>[b.id,b]));
const TYPES=['제품홍보','이벤트','후기','정보','밈','PPL','식단','운동','챌린지','브이로그'];
const FORMATS=['릴스','피드','스토리','캐러셀','라이브','유튜브'];
const STATUSES=[{k:'기획',c:'#6366f1',bg:'rgba(99,102,241,.12)'},{k:'제작중',c:'#ea580c',bg:'rgba(234,92,22,.12)'},{k:'검수',c:'#ca8a04',bg:'rgba(202,138,4,.12)'},{k:'완료',c:'#16a34a',bg:'rgba(22,163,74,.12)'},{k:'보류',c:'#6b7280',bg:'rgba(107,114,128,.12)'}];
const PRIS=['높음','중간','낮음'];
const VIRAL=['댓글유도','저장유도','참여형','공유유도','질문형','투표','챌린지','정보공유'];
const DKO=['일','월','화','수','목','금','토'];
const DEN=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const RTAGS=['식단','제품','후기','이벤트','운동','밈'];

// ── 유틸 ────────────────────────────────────────────────
const pad=n=>String(n).padStart(2,'0');
const toDS=(y,m,d)=>`${y}-${pad(m)}-${pad(d)}`;
const today=()=>{const d=new Date();return toDS(d.getFullYear(),d.getMonth()+1,d.getDate());};
const genId=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const getSt=k=>STATUSES.find(s=>s.k===k)||{k,c:'#888',bg:'rgba(136,136,136,.12)'};
const getBrand=id=>BM[id]||BRANDS[0];
const getDIM=(y,m)=>new Date(y,m,0).getDate();
const getDow=(y,m)=>new Date(y,m-1,1).getDay();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function calDays(y,m){const tot=getDIM(y,m),first=getDow(y,m),prev=getDIM(y,m-1),days=[];for(let i=first-1;i>=0;i--){const pm=m===1?12:m-1,py=m===1?y-1:y;days.push({date:toDS(py,pm,prev-i),cur:false});}for(let d=1;d<=tot;d++)days.push({date:toDS(y,m,d),cur:true});const rem=42-days.length;for(let d=1;d<=rem;d++){const nm=m===12?1:m+1,ny=m===12?y+1:y;days.push({date:toDS(ny,nm,d),cur:false});}return days;}
function weekDays(){const t=new Date(today()+'T00:00:00'),dow=t.getDay(),days=[];for(let i=0;i<7;i++){const d=new Date(t);d.setDate(d.getDate()-dow+i);days.push(toDS(d.getFullYear(),d.getMonth()+1,d.getDate()));}return days;}

// ── 앱 상태 ─────────────────────────────────────────────
const S={
  year:new Date().getFullYear(),
  month:new Date().getMonth()+1,
  view:'month',
  data:{},
  routines:{0:null,1:null,2:null,3:null,4:null,5:null,6:null},
  filter:{brand:'',type:'',status:'',search:''},
  modal:null,
  sidebar:false,
  drag:null,
  // 모달 내부 상태 (render와 분리)
  mSt:'기획', mViral:[], mImg:'', mBrand:'samdae'
};

// ── Firebase 리스너 (한 번만 등록) ──────────────────────
let fbReady=false;
db.ref('items').on('value', snap=>{
  S.data = snap.val()||{};
  if(fbReady) renderCalOnly(); // 캘린더 영역만 갱신 (모달 건드리지 않음)
});
db.ref('routines').on('value', snap=>{
  S.routines = snap.val()||{0:null,1:null,2:null,3:null,4:null,5:null,6:null};
  if(fbReady) renderCalOnly();
});

// 1.5초 후 로딩 숨기고 앱 표시
setTimeout(()=>{
  fbReady=true;
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  renderFull();
},1500);

// ── Firebase CRUD ────────────────────────────────────────
function fbSave(item){
  db.ref(`items/${item.date.replace(/-/g,'_')}/${item.id}`).set(item);
}
function fbDel(id,date){
  db.ref(`items/${date.replace(/-/g,'_')}/${id}`).remove();
}
function fbMove(id,from,to){
  const b=S.data[from.replace(/-/g,'_')];
  const item=b&&(Array.isArray(b)?b.find(x=>x.id===id):b[id]);
  if(!item)return;
  db.ref(`items/${from.replace(/-/g,'_')}/${id}`).remove();
  db.ref(`items/${to.replace(/-/g,'_')}/${id}`).set({...item,date:to});
}
function fbRout(r){db.ref('routines').set(r);}

// ── 데이터 헬퍼 ─────────────────────────────────────────
function getItems(date){
  const k=date.replace(/-/g,'_'),b=S.data[k];
  if(!b)return[];
  return Array.isArray(b)?b:Object.values(b);
}
function filt(items){
  return items.filter(x=>{
    const f=S.filter;
    if(f.brand&&x.brand!==f.brand)return false;
    if(f.type&&x.type!==f.type)return false;
    if(f.status&&x.status!==f.status)return false;
    if(f.search){const q=f.search.toLowerCase();return x.title.toLowerCase().includes(q)||(x.hashtags||[]).some(h=>h.toLowerCase().includes(q));}
    return true;
  });
}
function blank(date){

function buildMonth(tS){

function buildCell({date,cur},tS){
  const dow=new Date(date+'T00:00:00').getDay(),isT=date===tS;

}
function buildWeek(tS){
  const days=weekDays();
  return`<div class="week-grid">${days.map(date=>{const dow=new Date(date+'T00:00:00').getDay(),isT=date===tS,n=parseInt(date.split('-')[2]);return`<div class="wk-dh"><div class="wk-dh-n">${DEN[dow]}</div><div class="wk-dh-d${isT?' td':''}">${n}</div></div>`;}).join('')}${days.map(date=>{const isT=date===tS,items=filt(getItems(date));return`<div class="wk-cell${isT?' td':''}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dDrop(event,'${date}')">${items.map(x=>card(x)).join('')}<button class="cell-add" onclick="oAdd('${date}',event)">＋ 추가</button></div>`;}).join('')}</div>`;

    $$('[data-rd]').forEach(el=>{

      cta:     $('#mct').value, url: $('#murl').value, url: $('#murl').value, url: $('#murl').value, url: $('#murl').value, url: $('#murl').value, url: $('#murl').value, url: $('#murl').value,
      status:  S.mSt,      // ← 핵심: S.mSt 사용
      viral:   S.mViral,
      image:   S.mImg||iu,
      metrics:{
        likes:   parseInt($('#m_likes').value)||0,
        comments:parseInt($('#m_comments').value)||0,
        saves:   parseInt($('#m_saves').value)||0,
        shares:  parseInt($('#m_shares').value)||0,
      },
      date:m.date,
    };
    fbSave(item);
    S.modal=null;
    renderFull();
    toast('✅ 저장 완료!');
  });
}

// ── 드래그 앤 드롭 ───────────────────────────────────────
function dStart(e,id,date){S.drag={id,from:date};e.dataTransfer.effectAllowed='move';e.currentTarget.style.opacity='.4';}
function dEnd(e){e.currentTarget.style.opacity='';S.drag=null;}
function dDrop(e,to){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!S.drag)return;
  const{id,from}=S.drag;
  if(from!==to)fbMove(id,from,to);
  S.drag=null;
}

// ── 모달 오프너 ──────────────────────────────────────────
function oAdd(date,e){
  if(e)e.stopPropagation();
  S.modal={type:'content',date,item:null,_initialized:false};
  renderFull();
}
function oEdit(id,date,e){
  if(e)e.stopPropagation();
  const item=getItems(date).find(x=>x.id===id);
  if(!item)return;
  S.modal={type:'content',date,item,_initialized:false};
  renderFull();
}
</script>
</body>
</html>
