<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;font-size:13px;background:#0a0a0a;color:#f0f0f0;}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--border:#2a2a2a;--border2:#333;--red:#e8291c;--blue:#2563eb;--text:#f0f0f0;--text2:#999;--text3:#555;--sw:256px;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-mark{width:36px;height:36px;border-radius:9px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;flex-shrink:0;}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--red);letter-spacing:2px;}
.sb-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;}
.sb-sec{padding:12px 14px 4px;}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.sb-lbl-link{color:var(--red);cursor:pointer;font-size:10px;}
.brand-btns{display:flex;flex-direction:column;gap:3px;}
.brand-btn{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-family:inherit;color:var(--text2);transition:all .14s;text-align:left;}
.brand-btn:hover{background:var(--bg4);color:var(--text);}.brand-btn.on{border-color:currentColor;font-weight:700;}
.brand-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{padding:3px 8px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);transition:all .13s;white-space:nowrap;user-select:none;}
.chip:hover{border-color:var(--red);color:var(--red);}.chip.on{background:var(--red);border-color:var(--red);color:#fff;}
.sb-search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.sb-search:focus{border-color:var(--red);}
.sb-search::placeholder{color:var(--text3);}
.rout-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:7px;margin-bottom:2px;cursor:pointer;transition:background .13s;}
.rout-row:hover{background:var(--bg3);}
.rout-day{font-size:11px;font-weight:700;color:var(--red);width:22px;}
.rout-tag{flex:1;font-size:10px;padding:2px 8px;border-radius:5px;text-align:center;background:var(--bg3);color:var(--text2);}
.rout-tag.set{background:rgba(232,41,28,.15);color:var(--red);font-weight:600;}
.sb-bottom{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:6px;}
.sb-btn{flex:1;padding:7px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;text-align:center;}
.sb-btn:hover{background:var(--bg4);color:var(--text);}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-btn{width:30px;height:30px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.m-sel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);cursor:pointer;outline:none;}
.today-btn{padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;}
.today-btn:hover{border-color:var(--red);color:var(--red);}
